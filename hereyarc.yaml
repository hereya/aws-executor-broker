name: hereya/aws-executor-broker
version: 0.1.2
description: "[DEPRECATED — use hereya/remote-executor-aws@>=0.6.0 with parameter mode=ephemeral, which merges this functionality into the canonical executor package and drops the stopped-instance / wake-lock plumbing in favour of an ASG with min=0/max=1 controlled by the broker Lambda.] Ephemeral remote executor broker. Deploys: Lambda + stopped EC2 + DynamoDB wake-lock + OIDC identity provider."
visibility: public
iac: cdk
infra: aws
deploy: true
parameters:
  workspaceId:
    description: "Hereya workspace ID this broker serves. Used in the broker invoker IAM role's trust condition (sub == workspace:<id>) and as a tag on EC2 instances."
    mandatory: true
  workspaceName:
    description: "Hereya workspace name (human-readable). Passed to the executor as `hereya executor start -w <name>`."
    mandatory: true
  hereyaCloudUrl:
    description: "Hereya Cloud public origin (e.g. https://cloud.hereya.dev). Used as the OIDC issuer URL and as the API host for the broker Lambda's calls back to hereya-cloud."
    mandatory: true
  brokerConcurrency:
    description: "Reserved Lambda concurrency. Default 50."
    mandatory: false
    default: "50"
  ec2InstanceType:
    description: "EC2 instance type for heavyweight executor (default t3.medium)."
    mandatory: false
    default: "t3.medium"
  idleTimeoutSeconds:
    description: "EC2 executor idle-shutdown timeout in seconds. Default 600 (10 min)."
    mandatory: false
    default: "600"
